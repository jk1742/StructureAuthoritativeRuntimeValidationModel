<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380" font-family="Helvetica, Arial, sans-serif" role="img">
<title>Detection matrix snapshot-diff vs identity continuity</title>
<desc>Matrix showing detection outcomes across four scenarios for snapshot-diff baseline and identity continuity model</desc>
<style>
  .axis { stroke: #000; stroke-width: 1; fill: none; }
  .grid { stroke: #DDD; stroke-width: 0.5; fill: none; }
  .tick { font-size: 11px; fill: #000; }
  .title { font-size: 14px; font-weight: bold; fill: #000; }
  .legend { font-size: 12px; fill: #000; }
  .axis-label { font-size: 12px; fill: #000; }
  .cell-text { font-size: 12px; fill: #000; }
  .cell-detected { fill: #222222; }
  .cell-missed   { fill: #FFFFFF; }
  .cell-valid    { fill: #DDDDDD; }
</style>
<rect x="0" y="0" width="800" height="380" fill="#FFFFFF"/>
<text x="400" y="30" text-anchor="middle" class="title">Fig. 4. Detection Outcome — Snapshot-diff vs Identity Continuity</text>
<text x="400" y="50" text-anchor="middle" class="tick" fill="#444">(T1 highlights a false negative of snapshot-diff)</text>
<text x="355" y="60" text-anchor="middle" class="legend" font-weight="bold">Snapshot-diff (baseline)</text>
<text x="625" y="60" text-anchor="middle" class="legend" font-weight="bold">Identity continuity (proposed)</text>
<text x="208" y="102.75" text-anchor="end" class="legend">T1. Identical replacement</text>
<rect x="220" y="70" width="270" height="57.5" fill="#FFFFFF" stroke="#000" stroke-width="1"/>
<text x="355" y="102.75" text-anchor="middle" class="cell-text" fill="#000" font-weight="bold">✗ MISSED</text>
<rect x="490" y="70" width="270" height="57.5" fill="#222222" stroke="#000" stroke-width="1"/>
<text x="625" y="102.75" text-anchor="middle" class="cell-text" fill="#FFF" font-weight="bold">✓ Detected</text>
<text x="208" y="160.25" text-anchor="end" class="legend">T2. Genuine no-op (control)</text>
<rect x="220" y="127.5" width="270" height="57.5" fill="#BBBBBB" stroke="#000" stroke-width="1"/>
<text x="355" y="160.25" text-anchor="middle" class="cell-text" fill="#000" font-weight="bold">  valid</text>
<rect x="490" y="127.5" width="270" height="57.5" fill="#BBBBBB" stroke="#000" stroke-width="1"/>
<text x="625" y="160.25" text-anchor="middle" class="cell-text" fill="#000" font-weight="bold">  valid</text>
<text x="208" y="217.75" text-anchor="end" class="legend">T3. Value mutation</text>
<rect x="220" y="185" width="270" height="57.5" fill="#222222" stroke="#000" stroke-width="1"/>
<text x="355" y="217.75" text-anchor="middle" class="cell-text" fill="#FFF" font-weight="bold">✓ Detected</text>
<rect x="490" y="185" width="270" height="57.5" fill="#222222" stroke="#000" stroke-width="1"/>
<text x="625" y="217.75" text-anchor="middle" class="cell-text" fill="#FFF" font-weight="bold">✓ Detected</text>
<text x="208" y="275.25" text-anchor="end" class="legend">T4. Structural insertion</text>
<rect x="220" y="242.5" width="270" height="57.5" fill="#222222" stroke="#000" stroke-width="1"/>
<text x="355" y="275.25" text-anchor="middle" class="cell-text" fill="#FFF" font-weight="bold">✓ Detected</text>
<rect x="490" y="242.5" width="270" height="57.5" fill="#222222" stroke="#000" stroke-width="1"/>
<text x="625" y="275.25" text-anchor="middle" class="cell-text" fill="#FFF" font-weight="bold">✓ Detected</text>
<rect x="220" y="335" width="14" height="14" fill="#222222" stroke="#000"/>
<text x="240" y="347" class="legend">Detected (correct)</text>
<rect x="380" y="335" width="14" height="14" fill="#FFFFFF" stroke="#000"/>
<text x="400" y="347" class="legend">MISSED (false negative)</text>
<rect x="580" y="335" width="14" height="14" fill="#BBBBBB" stroke="#000"/>
<text x="600" y="347" class="legend">valid (control)</text>
</svg>
