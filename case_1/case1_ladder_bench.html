<!doctype html>
<!--
 * case_1/browser/case1_ladder_bench.html
 * Paper Section 6 - Case 1: Forgery Cost Ladder (in-browser, real DOM)
-->
<html>
  <head><meta charset="utf-8" /><title>Case 1 ladder bench (real DOM)</title></head>
  <body>
    <form id="root">
      <input id="username" type="text" />
      <input id="agree" type="checkbox" />
      <textarea id="memo">hello world</textarea>
    </form>

    <script type="module">
      import { createRegistry } from "../../model-core.mjs";
      
      const INIT_USERNAME = "alice";
      const INIT_AGREE = false;
      const INIT_MEMO = "hello world";
      // case1_ladder_experiment.mjs  canonicalTree()
      const canonicalTree = () => ({
        id: "e-root", parentId: null, order: 0, type: "form", children: [
          { id: "e-username", parentId: "e-root", order: 0, type: "input",    value: INIT_USERNAME, children: [] },
          { id: "e-agree",    parentId: "e-root", order: 1, type: "input",    checked: INIT_AGREE,  children: [] },
          { id: "e-memo",     parentId: "e-root", order: 2, type: "textarea", value: INIT_MEMO,     children: [] },
        ],
      });

      // baseline (MetaTag): truth as in-DOM <meta>, on the mutable surface
      const setTruth = (id, v) => {
        let m = document.querySelector(`meta[name="truth:${id}"]`);
        if (!m) { m = document.createElement("meta"); m.setAttribute("name", `truth:${id}`); document.head.appendChild(m); }
        m.setAttribute("content", String(v));
      };
      const metaValid = (id) => {
        const node = document.getElementById(id);
        const truth = (document.querySelector(`meta[name="truth:${id}"]`) || {}).getAttribute
          ? document.querySelector(`meta[name="truth:${id}"]`).getAttribute("content") : null;
        if (node.type === "checkbox" || node.type === "radio") return String(!!node.checked) === String(truth === "true");
        return String(node.value ?? "") === String(truth ?? "");
      };

      const U = document.getElementById("username");
      const A = document.getElementById("agree");
      const M = document.getElementById("memo");
      U.value = INIT_USERNAME; A.checked = INIT_AGREE; M.value = INIT_MEMO;
      setTruth("username", INIT_USERNAME); setTruth("agree", INIT_AGREE); setTruth("memo", INIT_MEMO);

      const registry = createRegistry(document);            // ← closure
      registry.mount(document.getElementById("root"), canonicalTree());
      registry.commit(U); registry.commit(A); registry.commit(M);

      // ── interaction channel (event delegation)
      const channelRoot = document.getElementById("root");
      const boundToEntity = (n) => n === U || n === A || n === M;
      const channelGate = (e) => {
        if (e.isTrusted !== true) return;                   // provenance gate
        if (boundToEntity(e.target)) registry.commit(e.target);
      };
      channelRoot.addEventListener("input",  channelGate);  // username / memo
      channelRoot.addEventListener("change", channelGate);  // agree(checkbox)
      window.__app = {
        verdict() {                                          // proposed: validate throw
          try { registry.validate(document.getElementById("root")); return { passed: true, reason: null }; }
          catch (e) { return { passed: false, reason: (e && e.message) ? e.message : String(e) }; }
        },
        metaDetected() {                                     // baseline
          return ["username", "agree", "memo"].some((id) => !metaValid(id));
        },
    
        __demoInsideChannelDrive(id) { registry.commit(document.getElementById(id)); },
      };
      window.__ready = true;
    </script>
  </body>
</html>
